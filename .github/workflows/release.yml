name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release
      - name: Verify Verilog artifacts
        run: |
          test -f target/goldilocks_ntt_2_24.v
          test -f target/goldilocks_ntt_1024.v
          test -f target/bram_ntt_size_8.v
          test -f target/bram_ntt_size_4.v
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            target/goldilocks_ntt_2_24.v \
            target/goldilocks_ntt_1024.v \
            target/bram_ntt_size_8.v \
            target/bram_ntt_size_4.v
